version: 2
updates:
  # npm/pnpm Pakete
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Berlin"
    # Nur Sicherheits-Updates automatisch
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"
    ignore:
      # Major Updates manuell prüfen
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions (falls wir später CI/CD bauen)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"

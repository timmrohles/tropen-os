name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  ci:
    name: Typecheck · Test · Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Qualitäts-Checks ──────────────────────────────────────────

      - name: TypeScript Typecheck
        id: typecheck
        run: pnpm typecheck

      - name: Unit Tests
        id: unit_tests
        run: pnpm test -- --reporter=verbose --reporter=json --outputFile=test-results/unit.json
        env:
          # Keine echten API-Keys nötig — alles gemockt
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          LANGSMITH_TRACING: 'false'
          LANGSMITH_API_KEY: ''

      # ── Test-Ergebnisse in Supabase schreiben ────────────────────

      - name: Write Test Results to Supabase
        if: always()
        run: node scripts/ci/write-test-results.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CI_COMMIT_SHA: ${{ github.sha }}
          CI_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TYPECHECK_OUTCOME: ${{ steps.typecheck.outcome }}
          UNIT_TEST_OUTCOME: ${{ steps.unit_tests.outcome }}

      # ── Artefakte ────────────────────────────────────────────────

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.sha }}
          path: test-results/
          retention-days: 30

      # ── Deploy (nur main) ────────────────────────────────────────

      - name: Deploy to Vercel
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: pnpm dlx vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

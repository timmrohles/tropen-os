name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  check:
    name: PR Quality Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        id: typecheck
        run: pnpm typecheck

      - name: Unit Tests
        id: unit_tests
        run: pnpm test
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          LANGSMITH_TRACING: 'false'
          LANGSMITH_API_KEY: ''

      - name: PR Summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const outcome = '${{ job.status }}'
            const emoji = outcome === 'success' ? '✅' : '❌'
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ${emoji} CI Check\n\n` +
                    `**Typecheck:** ${{ steps.typecheck.outcome }}\n` +
                    `**Tests:** ${{ steps.unit_tests.outcome }}\n\n` +
                    `[Details](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
            })
